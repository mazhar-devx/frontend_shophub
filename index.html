  <div id="google_translate_element" style="display:none"></div>
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }

    function doGoogleLanguageTranslation(langCode) {
      const cookieValue = `/en/${langCode}`;
      const domain = window.location.hostname;
      const domainParts = domain.split('.');
      const rootDomain = domainParts.length > 2 ? domainParts.slice(-2).join('.') : domain;

      // Set cookies for persistence
      const expires = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toUTCString();
      document.cookie = `googtrans=${cookieValue}; path=/; expires=${expires}; domain=.${rootDomain};`;
      document.cookie = `googtrans=${cookieValue}; path=/; expires=${expires};`;

      // INSTANT APPLY: Try to find the combo box and trigger it without reload
      const googleCombo = document.querySelector('.goog-te-combo');
      if (googleCombo) {
        googleCombo.value = langCode;
        googleCombo.dispatchEvent(new Event('change'));
        
        // Hide any "Loading" artifacts if they appear
        setTimeout(() => {
          const banner = document.querySelector('.goog-te-banner-frame');
          if (banner) banner.style.display = 'none';
          document.body.style.top = '0';
        }, 500);
      } else {
        // Fallback to reload only if the engine hasn't initialized yet
        window.location.reload();
      }
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
