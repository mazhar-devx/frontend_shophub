<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="shortcut icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="description"
    content="ShopHub.pro - Pakistan's premier luxury destination for high-end fashion, electronics, and social shopping. Experience the future of e-commerce with 24h delivery and premium quality.">
  <meta name="keywords"
    content="ShopHub.pro, luxury shopping Pakistan, online electronics store, premium fashion marketplace, social commerce app, Pakistan online store, fast delivery e-commerce">
  <link rel="canonical" href="https://www.shophub.pro/" />
  
  <!-- Preconnect to critical domains -->
  <link rel="preconnect" href="https://backend-shophub.vercel.app">
  <link rel="preconnect" href="https://images.unsplash.com">

  <!-- Cache Control to prevent stale content -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- PWA Install Handling -->
  <script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log('PWA: deferredPrompt saved');
    });
  </script>

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.shophub.pro/">
  <meta property="og:title" content="ShopHub.pro - Pakistan's Luxury Shopping & Social Hub">
  <meta property="og:description"
    content="ShopHub.pro is the ultimate destination for premium electronics, fashion, and social video shopping in Pakistan. Experience 24h delivery and exclusive deals.">
  <meta property="og:image" content="https://www.shophub.pro/logo.png">
  <meta property="og:site_name" content="ShopHub.pro">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://www.shophub.pro/">
  <meta property="twitter:title" content="ShopHub.pro - Pakistan's Luxury Shopping & Social Hub">
  <meta property="twitter:description"
    content="Experience the future of shopping in Pakistan. Premium electronics, fashion, and social videos at ShopHub.pro.">
  <meta property="twitter:image" content="https://www.shophub.pro/logo.png">

  <title>ShopHub.pro - Pakistan's #1 Luxury Shopping & Social Marketplace</title>

  <!-- Structured Data for Rich Results -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "ShopHub.pro",
    "url": "https://www.shophub.pro",
    "logo": "https://www.shophub.pro/logo.png",
    "sameAs": [
      "https://facebook.com/shophub.pro",
      "https://instagram.com/shophub.pro",
      "https://twitter.com/shophub_pro"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+92-300-1234567",
      "contactType": "customer service"
    }
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "url": "https://www.shophub.pro",
    "name": "ShopHub.pro",
    "alternateName": "ShopHub",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://www.shophub.pro/products?search={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "ShopHub.pro Navigation",
    "itemListElement": [
      {
        "@type": "SiteNavigationElement",
        "position": 1,
        "name": "Premium Electronics",
        "url": "https://www.shophub.pro/products?category=electronics"
      },
      {
        "@type": "SiteNavigationElement",
        "position": 2,
        "name": "Luxury Fashion",
        "url": "https://www.shophub.pro/products?category=fashion"
      },
      {
        "@type": "SiteNavigationElement",
        "position": 3,
        "name": "Watch Me - Social Shopping",
        "url": "https://www.shophub.pro/watch-me"
      },
      {
        "@type": "SiteNavigationElement",
        "position": 4,
        "name": "Flash Sale Deals",
        "url": "https://www.shophub.pro/deals"
      }
    ]
  }
  </script>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6521940579323633"
    crossorigin="anonymous"></script>
  <script async custom-element="amp-ad" src="https://cdn.ampproject.org/v0/amp-ad-0.1.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
